version: "3.9"
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: winnie
    ports: ["5432:5432"]
    volumes:
      - db_data:/var/lib/postgresql/data
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    depends_on: [db]
    ports: ["8000:8000"]
    volumes:
      - ./:/app
volumes:
  db_data:
