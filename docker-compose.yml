
version: "3.9"

services:
  doomsat:
    build: ./doomsat
    container_name: doomsat
    ports:
      - "7000:7000"
    volumes:
      - ./doomsat/memory:/opt/doomsat/memory

  backend:
    build: ./backend
    container_name: doom-backend
    environment:
      - DOOMSAT_HOST=doomsat
      - DOOMSAT_PORT=7000
    depends_on:
      - doomsat
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: doom-frontend
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
    ports:
      - "3000:3000"
